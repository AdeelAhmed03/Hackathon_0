version: '3.8'

# ═══════════════════════════════════════════════════════════════════════════
# Platinum Tier — Odoo 19 Cloud Stack
#
# Services: PostgreSQL 15 + Odoo 19 + Nginx (HTTPS) + Certbot (auto-renew)
#
# Platinum spec:
#   - Cloud agent calls odoo-mcp to CREATE DRAFT invoices (never posts)
#   - Local agent calls odoo-mcp to APPROVE + POST after human HITL
#   - Backups via external cron (backup-odoo.sh → data/Backups/)
#   - Health checks built into each service
#
# Usage (from the odoo-cloud/ directory created by odoo_cloud_deploy.sh):
#   docker compose up -d
#   docker compose logs -f
#   docker compose down
# ═══════════════════════════════════════════════════════════════════════════

services:
  # ── PostgreSQL 15 ─────────────────────────────────────────────────────
  odoo-db:
    image: postgres:15
    container_name: odoo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-odoo_platinum_2026}
      POSTGRES_DB: odoo
    volumes:
      - db-data:/var/lib/postgresql/data
    networks: [odoo-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d odoo"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Odoo 19 Community ─────────────────────────────────────────────────
  odoo:
    image: odoo:19.0
    container_name: odoo
    restart: unless-stopped
    depends_on:
      odoo-db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8069:8069"    # Only localhost — nginx handles external
      - "127.0.0.1:8072:8072"    # Longpolling
    environment:
      HOST: odoo-db
      USER: odoo
      PASSWORD: ${POSTGRES_PASSWORD:-odoo_platinum_2026}
    volumes:
      - odoo-data:/var/lib/odoo
      - ./addons:/mnt/extra-addons:ro
      - ./config/odoo.conf:/etc/odoo/odoo.conf:ro
    networks: [odoo-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8069/web/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Nginx HTTPS reverse proxy ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: odoo-nginx
    restart: unless-stopped
    depends_on: [odoo]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/certs:/etc/letsencrypt:ro
      - ./ssl/certbot-webroot:/var/www/certbot:ro
    networks: [odoo-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Certbot (auto-renew Let's Encrypt every 12h) ─────────────────────
  certbot:
    image: certbot/certbot
    container_name: odoo-certbot
    restart: unless-stopped
    volumes:
      - ./data/certs:/etc/letsencrypt
      - ./ssl/certbot-webroot:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
    networks: [odoo-net]

volumes:
  db-data:
    driver: local
  odoo-data:
    driver: local

networks:
  odoo-net:
    driver: bridge
