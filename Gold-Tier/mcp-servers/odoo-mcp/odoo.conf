[options]
; ─── Odoo Community 19+ Configuration ───
; AI Employee Vault — Gold Tier
; Used by Docker container or local Odoo install

; ── Connection ──
xmlrpc_port = 8069
xmlrpc_interface = 0.0.0.0
longpolling_port = 8072

; ── Database ──
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo
db_name = ai_employee
dbfilter = ai_employee

; ── Paths ──
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo

; ── Logging ──
log_level = info
logfile = /var/log/odoo/odoo.log

; ── Security ──
admin_passwd = admin
list_db = True

; ── Performance ──
workers = 2
max_cron_threads = 1
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_time_cpu = 600
limit_time_real = 1200

; ── Modules to install ──
; Install these via the Odoo web UI or CLI:
;   odoo -d ai_employee -i account,account_payment
; Required modules for AI Employee Vault:
;   - account (Invoicing/Accounting)
;   - account_payment (Payment processing)
;   - contacts (Partner/Contact management)
